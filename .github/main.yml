name: CI/CD CleanTrack

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cleantrack-backend
            git pull origin main
            sudo docker stop web-api || true
            sudo docker rm web-api || true
            sudo docker build -t cleantrack-api .
            sudo docker run -d -p 3000:3000 --name web-api cleantrack-api