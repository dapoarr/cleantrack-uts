<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanTrack - Dasbor Laporan Sampah</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>

    <div class="container">
        <header>
            <h2><span class="material-symbols-rounded">delete_sweep</span> CleanTrack</h2>
            <p class="subtitle">Laporkan tumpukan sampah untuk lingkungan bersih</p>
        </header>

        <form id="formLapor">
            <label for="lokasi">Lokasi Kejadian</label>
            <input type="text" id="lokasi" required placeholder="Contoh: Jl. Sudirman No. 10">

            <label for="keterangan">Keterangan Kondisi</label>
            <textarea id="keterangan" required placeholder="Ceritakan detail tumpukan sampah..."></textarea>

            <label for="foto">Unggah Bukti Foto</label>
            <input type="file" id="foto" accept="image/*" required>

            <button type="submit" id="submitBtn">
                <span class="material-symbols-rounded">send</span>
                Kirim Laporan!
            </button>
        </form>

        <div id="hasil"></div>

        <hr>
        <button id="btnToggleRiwayat" class="btn-riwayat">
            <span class="material-symbols-rounded">close</span> Tutup Dasbor Manajemen
        </button>

        <div id="area-riwayat">
            <h3 class="dashboard-title pending">
                <span class="material-symbols-rounded">hourglass_empty</span> Belum Dibersihkan (Pending)
            </h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Lokasi</th>
                            <th>Keterangan</th>
                            <th>Foto</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-pending"></tbody>
                </table>
            </div>

            <h3 class="dashboard-title done">
                <span class="material-symbols-rounded">check_circle</span> Riwayat Sudah Dibersihkan (Done)
            </h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Lokasi</th>
                            <th>Keterangan</th>
                            <th>Foto</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-done"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://98.92.31.182:3000';

        const btnToggle = document.getElementById('btnToggleRiwayat');
        const areaRiwayat = document.getElementById('area-riwayat');

        btnToggle.addEventListener('click', () => {
            if (areaRiwayat.style.display === "none") {
                areaRiwayat.style.display = "block";
                btnToggle.innerHTML = '<span class="material-symbols-rounded">close</span> Tutup Dasbor Manajemen';
                muatDataLaporan();
            } else {
                areaRiwayat.style.display = "none";
                btnToggle.innerHTML = '<span class="material-symbols-rounded">dashboard</span> Buka Dasbor Manajemen Laporan';
            }
        });

        async function muatDataLaporan() {
            const tbPending = document.getElementById('tabel-pending');
            const tbDone = document.getElementById('tabel-done');

            tbPending.innerHTML = '<tr><td colspan="6" class="loading-text">Memuat data dari server AWS...</td></tr>';
            tbDone.innerHTML = '<tr><td colspan="6" class="loading-text">Memuat data dari server AWS...</td></tr>';

            try {
                const response = await fetch(`${API_URL}/lapor`);
                const data = await response.json();

                tbPending.innerHTML = '';
                tbDone.innerHTML = '';

                data.forEach(laporan => {
                    const statusPalsu = laporan.status || 'pending';

                    let barisHTML = `
                        <tr>
                            <td><b>#${laporan.id}</b></td>
                            <td>${laporan.lokasi}</td>
                            <td>${laporan.keterangan}</td>
                            <td>
                                <a href="${laporan.foto_url}" target="_blank" class="link-foto">
                                    <span class="material-symbols-rounded" style="font-size:16px;">image</span> Lihat S3
                                </a>
                            </td>
                            <td><span class="badge ${statusPalsu === 'done' ? 'done' : 'pending'}">${statusPalsu}</span></td>
                            <td>
                                <div class="action-group">
                                    ${statusPalsu === 'pending' ? `<button class="action-btn btn-done" onclick="tandaiSelesai(${laporan.id})"><span class="material-symbols-rounded" style="font-size:14px; vertical-align:middle;">check</span> Bersih</button>` : ''}
                                    <button class="action-btn btn-delete" onclick="hapusPermanen(${laporan.id})"><span class="material-symbols-rounded" style="font-size:14px; vertical-align:middle;">delete</span></button>
                                </div>
                            </td>
                        </tr>
                    `;

                    if (statusPalsu === 'done') {
                        tbDone.innerHTML += barisHTML;
                    } else {
                        tbPending.innerHTML += barisHTML;
                    }
                });

                if (tbPending.innerHTML === '') tbPending.innerHTML = '<tr><td colspan="6" class="empty-text">Tidak ada tugas pending.</td></tr>';
                if (tbDone.innerHTML === '') tbDone.innerHTML = '<tr><td colspan="6" class="empty-text">Belum ada riwayat dibersihkan.</td></tr>';

            } catch (error) {
                tbPending.innerHTML = '<tr><td colspan="6" style="color:#e74c3c;" class="empty-text">Gagal terhubung ke Database AWS!</td></tr>';
                tbDone.innerHTML = '';
            }
        }

        document.getElementById('formLapor').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const divHasil = document.getElementById('hasil');

            btn.innerHTML = `<span class="material-symbols-rounded">sync</span> Mengunggah...`;
            btn.disabled = true;

            const formData = new FormData();
            formData.append('lokasi', document.getElementById('lokasi').value);
            formData.append('keterangan', document.getElementById('keterangan').value);
            formData.append('foto', document.getElementById('foto').files[0]);

            try {
                const response = await fetch(`${API_URL}/lapor`, { method: 'POST', body: formData });
                if (response.ok) {
                    divHasil.style.display = "block";
                    divHasil.className = "hasil-container success-card";
                    divHasil.innerHTML = `✅ Laporan berhasil dikirim!`;

                    document.getElementById('formLapor').reset();
                    if (areaRiwayat.style.display === "block") muatDataLaporan();
                    setTimeout(() => { divHasil.style.display = "none"; }, 3000);
                } else {
                    const result = await response.json();
                    divHasil.style.display = "block";
                    divHasil.className = "hasil-container error-card";
                    divHasil.innerHTML = `<strong>Gagal:</strong> ${result.error}`;
                }
            } catch (error) {
                divHasil.style.display = "block";
                divHasil.className = "hasil-container error-card";
                divHasil.innerHTML = `<strong>Error:</strong> Gagal terhubung ke server EC2.`;
            } finally {
                btn.innerHTML = `<span class="material-symbols-rounded">send</span> Kirim Laporan!`;
                btn.disabled = false;
            }
        });

        // FUNGSI UPDATE STATUS
        window.tandaiSelesai = async function (id) {
            if (!confirm("Konfirmasi: Tumpukan sampah ini sudah dibersihkan petugas?")) return;
            try {
                await fetch(`${API_URL}/lapor/${id}/status`, { method: 'PUT' });
                muatDataLaporan();
            } catch (err) {
                alert("Gagal mengupdate status");
            }
        };

        // FUNGSI HAPUS PERMANEN
        window.hapusPermanen = async function (id) {
            if (!confirm("Yakin ingin menghapus data ini selamanya dari Database AWS?")) return;
            try {
                await fetch(`${API_URL}/lapor/${id}`, { method: 'DELETE' });
                muatDataLaporan();
            } catch (err) {
                alert("Gagal menghapus data");
            }
        };

        // Muat tabel riwayat begitu web dibuka
        window.onload = muatDataLaporan;
    </script>

</body>

</html>
